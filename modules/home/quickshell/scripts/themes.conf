      C[blue]="#458588" C[sapphire]="#076678" C[sky]="#076678"
      C[teal]="#689d6a" C[green]="#98971a" C[yellow]="#d79921"
      C[peach]="#d65d0e" C[orange]="#af3a03"
      C[accent]="#d79921"
      C[overlay2]="#7c6f64"
      ;;
    *)
      return 1
      ;;
  esac
}
