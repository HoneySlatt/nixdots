      C[blue]="#31748f" C[sapphire]="#9ccfd8" C[sky]="#9ccfd8"
      C[teal]="#9ccfd8" C[green]="#9ccfd8" C[yellow]="#f6c177"
      C[peach]="#f6c177" C[orange]="#f6c177"
      C[accent]="#c4a7e7"
