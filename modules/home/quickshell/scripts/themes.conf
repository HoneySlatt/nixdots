      C[pink]="#E0486B" C[mauve]="#B86EE6" C[lavender]="#6D8CE3"
      C[blue]="#6D8CE3" C[sapphire]="#63C7C8" C[sky]="#63C7C8"
      C[teal]="#63C7C8" C[green]="#6FBF8A" C[yellow]="#F1C75B"
      C[peach]="#F58A5C" C[orange]="#F58A5C"
